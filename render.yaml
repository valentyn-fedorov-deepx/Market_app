services:
  - type: web
    name: market-analyzer-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./market_analyzer.db
      - key: ENABLE_REMOTE_SOURCES
        value: "true"
      - key: CSV_FALLBACK_LIMIT
        value: "25000"
      - key: HF_LINKEDIN_LIMIT
        value: "33246"
      - key: HF_7M_LIMIT
        value: "80000"
      - key: REFRESH_ON_STARTUP
        value: "true"
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https?://.*onrender\\.com
      - key: LLM_PROVIDER
        value: openai_compatible
      - key: LLM_API_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_API_MODEL
        value: mistralai/mistral-7b-instruct:free
      - key: LLM_API_TITLE
        value: Market Analyzer App Demo
      - key: LLM_API_KEY
        sync: false
      - key: ASSISTANT_LLM_ENABLED
        value: "true"

  - type: static
    name: market-analyzer-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://market-analyzer-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
